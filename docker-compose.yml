services:
  app:
    build: .
    container_name: verifake_backend
    tty: true
    stdin_open: true
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app/services/backend
      - ./storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
    mem_limit: "1g"
    cpus: "1"
      - .:/app
    depends_on:
      - db
    environment:
      # FastAPI에서 사용할 DB 접속 주소
      DATABASE_URL: "mysql+pymysql://user:password@db:3306/verifake_db"
    command: uvicorn services.backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - backend_network

  db:
    image: mysql:8.0
    container_name: verifake_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password  # 루트 비밀번호
      MYSQL_DATABASE: verifake_db        # 생성할 DB 이름
      MYSQL_USER: user                   # 일반 사용자
      MYSQL_PASSWORD: password           # 일반 사용자 비밀번호
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql      # 데이터 영구 저장
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge
